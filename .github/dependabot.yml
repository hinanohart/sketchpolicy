version: 2
updates:
  # Security updates only: keep the open-version-update PR volume at zero so the
  # required CI checks are never blocked by routine bumps (org hygiene lesson).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
